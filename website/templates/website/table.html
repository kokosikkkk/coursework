{% load static %}
<html>
<head>
  <meta charset="UTF-8">
  <title>To-do list</title>
  <link rel="stylesheet" href="{% static 'website/css/style.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="{% static 'website/js/script.js' %}" defer></script>
</head>
<body>
<div class="container">
    <div class="todo-list">
        <h1>To-do list</h1>
        <form method="post">
            {% csrf_token %}
            <div class="input-container">
                <input type="text" name="name" placeholder="Add a new task" required>
                <button type="submit">+</button>
            </div>
        </form>


        <ul>
            {% for task in tasks %}
                <li>
                    <input type="checkbox" class="checkbox" {% if task.status %}checked{% endif %} data-id="{{task.id}}">
                    <span class="task {% if task.status %}completed{% endif %}">{{ task.task_name }}</span>
                    <button type="button" class="delete" data-id="{{task.id}}"><i class="fas fa-trash-alt"></i></button>
                    <button type="button" class="edit" data-id="{{task.id}}"><i class="fas fa-edit"></i></button>
                
                </li>
            {% endfor %}
        </ul>
    </div>
</div>
</body>
</html>
